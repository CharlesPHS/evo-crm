services:
  # ---------------------------------------------------------------------------
  # Infraestrutura
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-evo_community}
      POSTGRES_USER: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Auth Service — porta 3001
  # ---------------------------------------------------------------------------
  evo-auth:
    image: ghcr.io/evolutionapi/evo-auth-service-community:latest
    restart: unless-stopped
    env_file: .env
    environment:
      RAILS_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      POSTGRES_HOST: postgres
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  evo-auth-sidekiq:
    image: ghcr.io/evolutionapi/evo-auth-service-community:latest
    restart: unless-stopped
    env_file: .env
    environment:
      RAILS_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["bundle", "exec", "sidekiq"]

  # ---------------------------------------------------------------------------
  # CRM Service — porta 3000
  # ---------------------------------------------------------------------------
  evo-crm:
    image: ghcr.io/evolutionapi/evo-ai-crm-community:latest
    restart: unless-stopped
    env_file: .env
    environment:
      RAILS_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      POSTGRES_HOST: postgres
      EVO_AUTH_SERVICE_URL: http://evo-auth:3001
      EVO_AI_CORE_SERVICE_URL: http://evo-core:5555
      BOT_RUNTIME_URL: http://evo-bot-runtime:8080
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET}
      BOT_RUNTIME_POSTBACK_BASE_URL: http://evo-crm:3000
      BACKEND_URL: ${BACKEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    volumes:
      - crm_storage:/app/storage
      - crm_cache:/app/tmp/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evo-auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  evo-crm-sidekiq:
    image: ghcr.io/evolutionapi/evo-ai-crm-community:latest
    restart: unless-stopped
    env_file: .env
    environment:
      RAILS_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      POSTGRES_HOST: postgres
      EVO_AUTH_SERVICE_URL: http://evo-auth:3001
      EVO_AI_CORE_SERVICE_URL: http://evo-core:5555
      BOT_RUNTIME_URL: http://evo-bot-runtime:8080
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET}
    volumes:
      - crm_storage:/app/storage
      - crm_cache:/app/tmp/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

  # ---------------------------------------------------------------------------
  # Core Service — porta 5555
  # ---------------------------------------------------------------------------
  evo-core:
    image: ghcr.io/evolutionapi/evo-ai-core-service-community:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USERNAME:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DATABASE:-evo_community}
      DB_SSLMODE: disable
      PORT: "5555"
      EVOLUTION_BASE_URL: http://evo-crm:3000
      EVO_AUTH_BASE_URL: http://evo-auth:3001
      AI_PROCESSOR_URL: http://evo-processor:8000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5555/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Processor Service — porta 8000
  # ---------------------------------------------------------------------------
  evo-processor:
    image: ghcr.io/evolutionapi/evo-ai-processor-community:latest
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_CONNECTION_STRING: postgresql://${POSTGRES_USERNAME:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DATABASE:-evo_community}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SSL: "false"
      HOST: 0.0.0.0
      PORT: "8000"
      EVO_AI_CRM_URL: http://evo-crm:3000
      CORE_SERVICE_URL: http://evo-core:5555/api/v1
    volumes:
      - processor_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Bot Runtime — porta 8080
  # ---------------------------------------------------------------------------
  evo-bot-runtime:
    image: ghcr.io/evolutionapi/evo-bot-runtime:latest
    restart: unless-stopped
    env_file: .env
    environment:
      LISTEN_ADDR: 0.0.0.0:8080
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      AI_PROCESSOR_URL: http://evo-processor:8000
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      evo-processor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Frontend — porta 5173→80
  # ---------------------------------------------------------------------------
  evo-frontend:
    image: ghcr.io/evolutionapi/evo-ai-frontend-community:latest
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_AUTH_API_URL: ${VITE_AUTH_API_URL}
      VITE_WS_URL: ${VITE_API_URL}
      VITE_EVOAI_API_URL: ${VITE_EVOAI_API_URL}
      VITE_AGENT_PROCESSOR_URL: ${VITE_AGENT_PROCESSOR_URL}
    ports:
      - "5173:80"
    depends_on:
      evo-auth:
        condition: service_healthy
      evo-crm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  crm_storage:
  crm_cache:
  processor_logs:
