services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-evo_community}
      POSTGRES_USER: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evoai_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
    networks:
      - internal

  evo-auth:
    build:
      context: ./evo-auth-service-community
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
    command: bash -c "bundle exec rails db:prepare && bundle exec rails s -p 3001 -b 0.0.0.0"
    networks:
      - internal

  evo-auth-sidekiq:
    build:
      context: ./evo-auth-service-community
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
    command: bundle exec sidekiq
    networks:
      - internal

  evo-crm:
    build:
      context: ./evo-ai-crm-community
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
      - evo-auth
    command: sh -c "bundle exec rails db:prepare && bundle exec rails s -p 3000 -b 0.0.0.0"
    networks:
      - internal

  evo-crm-sidekiq:
    build:
      context: ./evo-ai-crm-community
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
    command: bundle exec sidekiq
    networks:
      - internal

  evo-core:
    build:
      context: ./evo-ai-core-service-community
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
    networks:
      - internal

  evo-processor:
    build:
      context: ./evo-ai-processor-community
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
    networks:
      - internal

  evo-bot-runtime:
    build:
      context: ./evo-bot-runtime
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
      - evo-processor
    networks:
      - internal

  evo-frontend:
    build:
      context: ./evo-ai-frontend-community
    restart: unless-stopped
    depends_on:
      - evo-auth
      - evo-crm
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  crm_storage:
  crm_cache:
  processor_logs:

networks:
  internal:
    driver: bridge
    internal: true
