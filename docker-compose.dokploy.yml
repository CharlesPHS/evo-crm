services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: evo_crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-evo_community}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME} -d ${POSTGRES_DATABASE:-evo_community}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: evo_crm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  evo_auth:
    image: evoapicloud/evo-auth-service-community:latest
    restart: unless-stopped
    command: >
      bash -c "bundle exec rails db:migrate 2>&1 || echo 'Migration had errors, continuing...';
      bundle exec rails s -p 3001 -b 0.0.0.0"
    environment:
      RAILS_ENV: production
      RAILS_MAX_THREADS: 5
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      EVOAI_CRM_API_TOKEN: ${EVOAI_CRM_API_TOKEN}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-evo_community}
      POSTGRES_SSLMODE: disable
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: https://${FRONTEND_DOMAIN}
      BACKEND_URL: https://${API_DOMAIN}
      CORS_ORIGINS: https://${FRONTEND_DOMAIN},https://${API_DOMAIN}
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL:-noreply@evoai.local}
      SMTP_ADDRESS: ${SMTP_ADDRESS:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_DOMAIN: ${SMTP_DOMAIN:-}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION:-plain}
      SMTP_ENABLE_STARTTLS_AUTO: ${SMTP_ENABLE_STARTTLS_AUTO:-true}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      DOORKEEPER_JWT_SECRET_KEY: ${DOORKEEPER_JWT_SECRET_KEY}
      DOORKEEPER_JWT_ALGORITHM: hs256
      DOORKEEPER_JWT_ISS: evo-auth-service
      MFA_ISSUER: ${MFA_ISSUER:-EvoCRM}
      SIDEKIQ_CONCURRENCY: ${SIDEKIQ_CONCURRENCY:-10}
      ACTIVE_STORAGE_SERVICE: ${ACTIVE_STORAGE_SERVICE:-local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_net
    expose:
      - "3001"

  evo_auth_sidekiq:
    image: evoapicloud/evo-auth-service-community:latest
    restart: unless-stopped
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      EVOAI_CRM_API_TOKEN: ${EVOAI_CRM_API_TOKEN}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-evo_community}
      POSTGRES_SSLMODE: disable
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: https://${FRONTEND_DOMAIN},https://${API_DOMAIN}
      SMTP_ADDRESS: ${SMTP_ADDRESS:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_DOMAIN: ${SMTP_DOMAIN:-}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION:-plain}
      SMTP_ENABLE_STARTTLS_AUTO: ${SMTP_ENABLE_STARTTLS_AUTO:-true}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      DOORKEEPER_JWT_SECRET_KEY: ${DOORKEEPER_JWT_SECRET_KEY}
      DOORKEEPER_JWT_ALGORITHM: hs256
      DOORKEEPER_JWT_ISS: evo-auth-service
      MFA_ISSUER: ${MFA_ISSUER:-EvoCRM}
      SIDEKIQ_CONCURRENCY: ${SIDEKIQ_CONCURRENCY:-10}
      ACTIVE_STORAGE_SERVICE: ${ACTIVE_STORAGE_SERVICE:-local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_net

  evo_crm:
    image: evoapicloud/evo-ai-crm-community:latest
    restart: unless-stopped
    command: >
      sh -c "until wget -qO- http://evo_auth:3001/health >/dev/null 2>&1; do echo 'Waiting for auth...'; sleep 5; done;
      bundle exec rails db:migrate 2>&1 || echo 'Migration had errors, continuing...';
      bundle exec rails s -p 3000 -b 0.0.0.0"
    environment:
      RAILS_ENV: production
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      EVOAI_CRM_API_TOKEN: ${EVOAI_CRM_API_TOKEN}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-evo_community}
      POSTGRES_SSLMODE: disable
      REDIS_URL: redis://redis:6379/0
      EVO_AUTH_SERVICE_URL: http://evo_auth:3001
      EVO_AI_CORE_SERVICE_URL: http://evo_core:5555
      BACKEND_URL: https://${API_DOMAIN}
      FRONTEND_URL: https://${FRONTEND_DOMAIN}
      CORS_ORIGINS: https://${FRONTEND_DOMAIN},https://${API_DOMAIN}
      DISABLE_TELEMETRY: "true"
      LOG_LEVEL: info
      ENABLE_ACCOUNT_SIGNUP: "true"
      ENABLE_PUSH_RELAY_SERVER: "true"
      ENABLE_INBOX_EVENTS: "true"
      BOT_RUNTIME_URL: http://evo_bot_runtime:8080
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET}
      BOT_RUNTIME_POSTBACK_BASE_URL: http://evo_crm:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evo_auth:
        condition: service_started
    networks:
      - app_net
    expose:
      - "3000"

  evo_crm_sidekiq:
    image: evoapicloud/evo-ai-crm-community:latest
    restart: unless-stopped
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      EVOAI_CRM_API_TOKEN: ${EVOAI_CRM_API_TOKEN}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-evo_community}
      POSTGRES_SSLMODE: disable
      REDIS_URL: redis://redis:6379/0
      EVO_AUTH_SERVICE_URL: http://evo_auth:3001
      EVO_AI_CORE_SERVICE_URL: http://evo_core:5555
      CORS_ORIGINS: https://${FRONTEND_DOMAIN},https://${API_DOMAIN}
      BOT_RUNTIME_URL: http://evo_bot_runtime:8080
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET}
      BOT_RUNTIME_POSTBACK_BASE_URL: http://evo_crm:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_net

  evo_core:
    image: evoapicloud/evo-ai-core-service-community:latest
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USERNAME}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DATABASE:-evo_community}
      DB_SSLMODE: disable
      DB_MAX_IDLE_CONNS: 10
      DB_MAX_OPEN_CONNS: 100
      DB_CONN_MAX_LIFETIME: 1h
      DB_CONN_MAX_IDLE_TIME: 30m
      PORT: "5555"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      EVOLUTION_BASE_URL: http://evo_crm:3000
      EVO_AUTH_BASE_URL: http://evo_auth:3001
      AI_PROCESSOR_URL: http://evo_processor:8000
      AI_PROCESSOR_VERSION: v1
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net
    expose:
      - "5555"

  evo_processor:
    image: evoapicloud/evo-ai-processor-community:latest
    restart: unless-stopped
    environment:
      PORT: "8000"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      EVO_AUTH_SERVICE_URL: http://evo_auth:3001
      EVO_AI_CORE_SERVICE_URL: http://evo_core:5555
      EVO_CRM_SERVICE_URL: http://evo_crm:3000
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      evo_auth:
        condition: service_started
      evo_core:
        condition: service_started
    networks:
      - app_net
    expose:
      - "8000"

  evo_bot_runtime:
    image: evoapicloud/evo-bot-runtime:latest
    restart: unless-stopped
    environment:
      PORT: "8080"
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_net
    expose:
      - "8080"

  evo_gateway:
    image: evoapicloud/evo-crm-gateway:latest
    restart: unless-stopped
    environment:
      AUTH_UPSTREAM: evo_auth:3001
      CRM_UPSTREAM: evo_crm:3000
      CORE_UPSTREAM: evo_core:5555
      PROCESSOR_UPSTREAM: evo_processor:8000
      BOT_RUNTIME_UPSTREAM: evo_bot_runtime:8080
    depends_on:
      evo_auth:
        condition: service_started
      evo_crm:
        condition: service_started
      evo_core:
        condition: service_started
      evo_processor:
        condition: service_started
    networks:
      - app_net
    expose:
      - "3030"

  evo_frontend:
    image: evoapicloud/evo-ai-frontend-community:latest
    restart: unless-stopped
    environment:
      VITE_APP_ENV: production
      VITE_API_URL: https://${API_DOMAIN}
      VITE_AUTH_API_URL: https://${API_DOMAIN}
      VITE_EVOAI_API_URL: https://${API_DOMAIN}
      VITE_AGENT_PROCESSOR_URL: https://${API_DOMAIN}
      VITE_WS_URL: https://${API_DOMAIN}
    depends_on:
      evo_gateway:
        condition: service_started
    networks:
      - app_net
    expose:
      - "80"

networks:
  app_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
