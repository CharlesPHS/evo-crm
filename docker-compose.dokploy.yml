services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-evo_community}
      POSTGRES_USER: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evoai_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - internal

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-evoai_redis_pass}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-evoai_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - internal

  evo-auth:
    build:
      context: ./evo-auth-service-community
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      RAILS_ENV: ${RAILS_ENV:-production}
      REDIS_URL: redis://:${REDIS_PASSWORD:-evoai_redis_pass}@redis:6379/1
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: bash -c "bundle exec rails db:prepare && bundle exec rails s -p 3001 -b 0.0.0.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - internal

  evo-auth-sidekiq:
    build:
      context: ./evo-auth-service-community
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      RAILS_ENV: ${RAILS_ENV:-production}
      REDIS_URL: redis://:${REDIS_PASSWORD:-evoai_redis_pass}@redis:6379/1
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: bash -c "bundle exec sidekiq"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - internal

  evo-crm:
    build:
      context: ./evo-ai-crm-community
      dockerfile: docker/Dockerfile
      args:
        BUNDLE_WITHOUT: "development test"
        RAILS_ENV: production
        RAILS_SERVE_STATIC_FILES: "true"
    restart: unless-stopped
    env_file: .env
    environment:
      RAILS_ENV: ${RAILS_ENV:-production}
      REDIS_URL: redis://:${REDIS_PASSWORD:-evoai_redis_pass}@redis:6379/0
      POSTGRES_HOST: postgres
      EVO_AUTH_SERVICE_URL: http://evo-auth:3001
      EVO_AI_CORE_SERVICE_URL: http://evo-core:5555
      BOT_RUNTIME_URL: http://evo-bot-runtime:8080
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET:-evo-bot-runtime-dev-secret}
      BOT_RUNTIME_POSTBACK_BASE_URL: http://evo-crm:3000
      BACKEND_URL: ${BACKEND_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    volumes:
      - crm_storage:/app/storage
      - crm_cache:/app/tmp/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evo-auth:
        condition: service_healthy
    command: sh -c "bundle exec rails db:prepare && bundle exec rails s -p 3000 -b 0.0.0.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - internal

  evo-crm-sidekiq:
    build:
      context: ./evo-ai-crm-community
      dockerfile: docker/Dockerfile
      args:
        BUNDLE_WITHOUT: "development test"
        RAILS_ENV: production
        RAILS_SERVE_STATIC_FILES: "true"
    restart: unless-stopped
    env_file: .env
    environment:
      RAILS_ENV: ${RAILS_ENV:-production}
      REDIS_URL: redis://:${REDIS_PASSWORD:-evoai_redis_pass}@redis:6379/0
      POSTGRES_HOST: postgres
      EVO_AUTH_SERVICE_URL: http://evo-auth:3001
      EVO_AI_CORE_SERVICE_URL: http://evo-core:5555
      BOT_RUNTIME_URL: http://evo-bot-runtime:8080
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET:-evo-bot-runtime-dev-secret}
    volumes:
      - crm_storage:/app/storage
      - crm_cache:/app/tmp/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "bundle exec sidekiq -C config/sidekiq.yml"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - internal

   evo-core:
    build:
      context: ./evo-ai-core-service-community
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USERNAME:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-evoai_dev_password}
      DB_NAME: ${POSTGRES_DATABASE:-evo_community}
      DB_SSLMODE: disable
      PORT: "5555"
      EVOLUTION_BASE_URL: http://evo-crm:3000
      EVO_AUTH_BASE_URL: http://evo-auth:3001
      AI_PROCESSOR_URL: http://evo-processor:8000
      GIN_MODE: release
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5555/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - internal

  evo-processor:
    build:
      context: ./evo-ai-processor-community
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_CONNECTION_STRING: postgresql://${POSTGRES_USERNAME:-postgres}:${POSTGRES_PASSWORD:-evoai_dev_password}@postgres:5432/${POSTGRES_DATABASE:-evo_community}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-evoai_redis_pass}
      REDIS_SSL: "false"
      HOST: 0.0.0.0
      PORT: "8000"
      EVO_AI_CRM_URL: http://evo-crm:3000
      CORE_SERVICE_URL: http://evo-core:5555/api/v1
    volumes:
      - processor_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - internal

  evo-bot-runtime:
    build:
      context: ./evo-bot-runtime
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      LISTEN_ADDR: 0.0.0.0:8080
      REDIS_URL: redis://:${REDIS_PASSWORD:-evoai_redis_pass}@redis:6379
      AI_PROCESSOR_URL: http://evo-processor:8000
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET:-evo-bot-runtime-dev-secret}
    depends_on:
      redis:
        condition: service_healthy
      evo-processor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - internal

  evo-frontend:
    build:
      context: ./evo-ai-frontend-community
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://crm-api.silveriosolucoes.com.br}
        VITE_AUTH_API_URL: ${VITE_AUTH_API_URL:-https://crm-auth.silveriosolucoes.com.br}
        VITE_EVOAI_API_URL: ${VITE_EVOAI_API_URL:-https://crm-api.silveriosolucoes.com.br}
        VITE_AGENT_PROCESSOR_URL: ${VITE_AGENT_PROCESSOR_URL:-https://crm-api.silveriosolucoes.com.br}
    restart: unless-stopped
    depends_on:
      evo-auth:
        condition: service_healthy
      evo-crm:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  crm_storage:
  crm_cache:
  processor_logs:

networks:
  internal:
    driver: bridge
    internal: true
